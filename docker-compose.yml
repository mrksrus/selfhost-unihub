services:
  # ── UniHub Application (Frontend + API) ─────────────────────────
  #
  # Bootstrap admin account (required on first start):
  #   UNIHUB_BOOTSTRAP_ADMIN_EMAIL + UNIHUB_BOOTSTRAP_ADMIN_PASSWORD
  # Password must be at least 12 characters.
  #
  unihub:
    image: ghcr.io/mrksrus/selfhost-unihub:latest
    pull_policy: always  # Always pull latest image on container start
    container_name: unihub
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "3000:80"
    environment:
      NODE_ENV: production
      MYSQL_DATABASE: unihub
      MYSQL_USER: unihub
      MYSQL_PASSWORD: ${UNIHUB_MYSQL_PASSWORD:?Set UNIHUB_MYSQL_PASSWORD to a strong database password before starting}
      MYSQL_HOST: unihub-mysql
      MYSQL_PORT: "3306"
      # ── Startup timing controls used by docker/start.sh ───────────────
      MYSQL_STARTUP_MAX_WAIT_SECONDS: "120"
      MYSQL_STARTUP_CHECK_INTERVAL_SECONDS: "5"
      UNIHUB_API_START_DELAY_SECONDS: "2"
      # ── Required: set a strong, random secret ──────────────────────
      # Generate one with:  openssl rand -base64 48
      JWT_SECRET: ${UNIHUB_JWT_SECRET:?Set UNIHUB_JWT_SECRET to a strong random value before starting}
      # ── Encryption key for stored email passwords ──────────────────
      ENCRYPTION_KEY: ${UNIHUB_ENCRYPTION_KEY:?Set UNIHUB_ENCRYPTION_KEY to a strong random value before starting}
      # ── First-run admin bootstrap (required when users table is empty) ──
      BOOTSTRAP_ADMIN_EMAIL: ${UNIHUB_BOOTSTRAP_ADMIN_EMAIL:?Set UNIHUB_BOOTSTRAP_ADMIN_EMAIL before first startup}
      BOOTSTRAP_ADMIN_PASSWORD: ${UNIHUB_BOOTSTRAP_ADMIN_PASSWORD:?Set UNIHUB_BOOTSTRAP_ADMIN_PASSWORD before first startup}
      # ── CORS allowlist (comma-separated origins) ───────────────────
      ALLOWED_ORIGINS: "http://localhost:3000,https://mydomain.domain.com"
      # ── Trust proxy headers only when behind a trusted reverse proxy ──
      TRUST_PROXY_HEADERS: "true"
      # ── Optional allowlist for self-hosted mail domains/IP hostnames ──
      TRUSTED_MAIL_HOSTS: mail.example.com
    depends_on:
      - unihub-mysql
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s   # Reduced since MySQL startup is optimized
    networks:
      - unihub-network
    volumes:
      - uploads_data:/app/uploads

  # ── MySQL Database ──────────────────────────────────────────────
  unihub-mysql:
    image: mysql:8.0
    container_name: unihub-mysql
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_DATABASE: unihub
      MYSQL_USER: unihub
      MYSQL_PASSWORD: ${UNIHUB_MYSQL_PASSWORD:?Set UNIHUB_MYSQL_PASSWORD to a strong database password before starting}
      MYSQL_ROOT_PASSWORD: ${UNIHUB_MYSQL_ROOT_PASSWORD:?Set UNIHUB_MYSQL_ROOT_PASSWORD to a strong root database password before starting}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=100
      - --innodb-buffer-pool-size=192M
      - --innodb-log-file-size=48M
      - --skip-name-resolve
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/conf/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    # Health check uses MYSQL_PWD to avoid YAML escaping issues
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - unihub-network

networks:
  unihub-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
